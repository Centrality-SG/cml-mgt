name: Identity Network - CD

on:
  push:
    branches: [ main ]
    paths:
      - "identity-network/**"
      - ".github/workflows/identity-network-cd.yaml"
  workflow_dispatch:
    inputs:
      terraform_cli_version:
        description: "Terraform CLI Version"
        required: true
        default: "latest"
        type: string

jobs:
  plan_and_apply:
    uses: Centrality-SG/cml-mgt-templates/.github/workflows/cd-template.yaml@main
    name: "CD"
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    with:
      root_module_folder_relative_path: "identity-network"
      terraform_cli_version: ${{ inputs.terraform_cli_version }}
